name: 🐛 Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for the report! Please don't include any private conversation content.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
      placeholder: Capture didn't fire after sending a message…
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ChatGPT
        2. Send "…"
        3. …
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Engine (backend)
        - Extension
        - Both / not sure
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: AI platform
      options: [Claude, ChatGPT, Gemini, N/A]
  - type: input
    id: os
    attributes:
      label: OS + browser
      placeholder: Windows 11 + Chrome 124
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Engine banner output and `[Mnemosyne]` console lines (F12). Redact anything sensitive.
      render: shell
